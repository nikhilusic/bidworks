openapi: 3.0.3
info:
  title: Estimate Management API
  version: 1.0.0
  description: |
    API contracts for managing multiple independent estimates per project,
    role-based task effort entry, and estimate-level roll-up calculations.
servers:
  - url: https://api.example.com
paths:
  /projects/{projectId}/estimates:
    post:
      summary: Create estimate
      description: Non-idempotent create operation. Server assigns revision/version and default Draft status.
      operationId: createEstimate
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEstimateRequest'
      responses:
        '201':
          description: Estimate created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Estimate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Duplicate estimate name within project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /projects/{projectId}/estimates/{estimateId}:
    patch:
      summary: Update estimate planning and metadata
      description: Uses optimistic concurrency via required revision in request body. Not idempotent across differing payloads.
      operationId: updateEstimate
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: estimateId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEstimateRequest'
      responses:
        '200':
          description: Estimate updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Estimate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Revision conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /projects/{projectId}/estimates/{estimateId}/roles:
    put:
      summary: Replace selected role types for estimate
      description: Idempotent replacement for selected roles when the same payload and revision are supplied.
      operationId: setEstimateRoles
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: estimateId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRolesRequest'
      responses:
        '200':
          description: Roles updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Estimate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Revision conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /projects/{projectId}/estimates/{estimateId}/tasks:
    post:
      summary: Create task with role effort entries
      description: Non-idempotent create operation; role-effort entries must use role types selected for the estimate.
      operationId: createTask
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: estimateId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created and roll-ups recalculated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Revision conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /projects/{projectId}/estimates/{estimateId}/tasks/{taskId}:
    patch:
      summary: Update task details, effort, repetitions, or enabled state
      description: Uses optimistic concurrency via required revision in request body.
      operationId: updateTask
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: estimateId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated and roll-ups recalculated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Revision conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /projects/{projectId}/estimates/{estimateId}/summary:
    get:
      summary: Get estimate summary
      description: Read-only retrieval of estimate-level summary totals. Idempotent.
      operationId: getEstimateSummary
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: estimateId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Estimate summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstimateSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  responses:
    BadRequest:
      description: Invalid request syntax or malformed payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication is required or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated user is not allowed to access this resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource does not exist in the requested scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Domain validation failed (for example role-selection, repetition, or planning constraints).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    CreateEstimateRequest:
      type: object
      required:
        - name
        - description
        - createdBy
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        startPeriod:
          type: string
          pattern: '^[0-9]{4}-(0[1-9]|1[0-2])$'
          description: Month-year format (YYYY-MM)
        durationMonths:
          type: integer
          minimum: 1
        createdBy:
          type: string
    UpdateEstimateRequest:
      type: object
      required:
        - revision
        - updatedBy
      properties:
        revision:
          type: integer
          minimum: 1
        name:
          type: string
        description:
          type: string
        startPeriod:
          type: string
          pattern: '^[0-9]{4}-(0[1-9]|1[0-2])$'
        durationMonths:
          type: integer
          minimum: 1
        updatedBy:
          type: string
    SetRolesRequest:
      type: object
      required:
        - roleTypeIds
        - revision
        - updatedBy
      properties:
        roleTypeIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
        revision:
          type: integer
          minimum: 1
        updatedBy:
          type: string
    CreateTaskRequest:
      type: object
      required:
        - revision
        - solutionPhase
        - module
        - title
        - description
        - repetitionCount
        - effortEntries
        - updatedBy
      properties:
        revision:
          type: integer
          minimum: 1
        solutionPhase:
          type: string
        module:
          type: string
        title:
          type: string
        description:
          type: string
        repetitionCount:
          type: integer
          minimum: 1
        effortEntries:
          type: array
          items:
            $ref: '#/components/schemas/TaskEffortEntryInput'
        updatedBy:
          type: string
    UpdateTaskRequest:
      type: object
      required:
        - revision
        - updatedBy
      properties:
        revision:
          type: integer
          minimum: 1
        title:
          type: string
        description:
          type: string
        repetitionCount:
          type: integer
          minimum: 1
        isEnabled:
          type: boolean
        effortEntries:
          type: array
          items:
            $ref: '#/components/schemas/TaskEffortEntryInput'
        updatedBy:
          type: string
    TaskEffortEntryInput:
      type: object
      required:
        - roleTypeId
        - effortHours
      properties:
        roleTypeId:
          type: string
          format: uuid
        effortHours:
          type: number
          minimum: 0
    Estimate:
      type: object
      required:
        - id
        - projectId
        - name
        - revision
        - status
        - startPeriod
        - durationMonths
        - createdAt
        - createdBy
        - updatedAt
        - updatedBy
        - totalEffortHours
        - totalCostEur
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        name:
          type: string
        revision:
          type: integer
        description:
          type: string
        status:
          type: string
          enum: [Draft]
        startPeriod:
          type: string
        durationMonths:
          type: integer
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        updatedAt:
          type: string
          format: date-time
        updatedBy:
          type: string
        totalEffortHours:
          type: number
        totalCostEur:
          type: number
    Task:
      type: object
      required:
        - id
        - title
        - isEnabled
        - repetitionCount
        - totalEffortHours
        - totalCostEur
      properties:
        id:
          type: string
          format: uuid
        solutionPhase:
          type: string
        module:
          type: string
        title:
          type: string
        description:
          type: string
        isEnabled:
          type: boolean
        repetitionCount:
          type: integer
        totalEffortHours:
          type: number
        totalCostEur:
          type: number
    EstimateSummary:
      type: object
      required:
        - estimateId
        - totalSolutionComponents
        - totalModules
        - totalTasks
        - totalEffortByRoleType
        - overallEffortHours
        - overallCostEur
      properties:
        estimateId:
          type: string
          format: uuid
        totalSolutionComponents:
          type: integer
          description: Count of distinct solution phases
        totalModules:
          type: integer
        totalTasks:
          type: integer
        totalEffortByRoleType:
          type: array
          items:
            type: object
            required: [roleTypeId, roleTypeName, effortHours]
            properties:
              roleTypeId:
                type: string
                format: uuid
              roleTypeName:
                type: string
              effortHours:
                type: number
        overallEffortHours:
          type: number
        overallCostEur:
          type: number
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Stable machine-readable error code.
        message:
          type: string
        details:
          type: array
          items:
            type: object
            required: [field, issue]
            properties:
              field:
                type: string
              issue:
                type: string
