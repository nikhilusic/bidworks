openapi: 3.0.3
info:
  title: Estimate Management API
  version: 1.0.0
  description: |
    API contracts for managing multiple independent estimates per project,
    role-based task effort entry, and estimate-level roll-up calculations.
servers:
  - url: https://api.example.com
paths:
  /projects/{projectId}/estimates:
    post:
      summary: Create estimate
      operationId: createEstimate
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEstimateRequest'
      responses:
        '201':
          description: Estimate created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Estimate'
        '409':
          description: Duplicate estimate name within project
  /projects/{projectId}/estimates/{estimateId}:
    patch:
      summary: Update estimate planning and metadata
      operationId: updateEstimate
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: estimateId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEstimateRequest'
      responses:
        '200':
          description: Estimate updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Estimate'
        '409':
          description: Revision conflict
  /projects/{projectId}/estimates/{estimateId}/roles:
    put:
      summary: Replace selected role types for estimate
      operationId: setEstimateRoles
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: estimateId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRolesRequest'
      responses:
        '200':
          description: Roles updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Estimate'
  /projects/{projectId}/estimates/{estimateId}/tasks:
    post:
      summary: Create task with role effort entries
      operationId: createTask
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: estimateId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created and roll-ups recalculated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
  /projects/{projectId}/estimates/{estimateId}/tasks/{taskId}:
    patch:
      summary: Update task details, effort, repetitions, or enabled state
      operationId: updateTask
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: estimateId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated and roll-ups recalculated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
  /projects/{projectId}/estimates/{estimateId}/summary:
    get:
      summary: Get estimate summary
      operationId: getEstimateSummary
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: estimateId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Estimate summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstimateSummary'
components:
  schemas:
    CreateEstimateRequest:
      type: object
      required:
        - name
        - description
        - startPeriod
        - durationMonths
        - createdBy
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        startPeriod:
          type: string
          pattern: '^[0-9]{4}-(0[1-9]|1[0-2])$'
          description: Month-year format (YYYY-MM)
        durationMonths:
          type: integer
          minimum: 1
        createdBy:
          type: string
    UpdateEstimateRequest:
      type: object
      required:
        - revision
        - updatedBy
      properties:
        revision:
          type: integer
          minimum: 1
        name:
          type: string
        description:
          type: string
        startPeriod:
          type: string
          pattern: '^[0-9]{4}-(0[1-9]|1[0-2])$'
        durationMonths:
          type: integer
          minimum: 1
        updatedBy:
          type: string
    SetRolesRequest:
      type: object
      required:
        - roleTypeIds
        - revision
        - updatedBy
      properties:
        roleTypeIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
        revision:
          type: integer
          minimum: 1
        updatedBy:
          type: string
    CreateTaskRequest:
      type: object
      required:
        - revision
        - solutionPhase
        - module
        - title
        - repetitionCount
        - effortEntries
        - updatedBy
      properties:
        revision:
          type: integer
          minimum: 1
        solutionPhase:
          type: string
        module:
          type: string
        title:
          type: string
        description:
          type: string
        repetitionCount:
          type: integer
          minimum: 1
        effortEntries:
          type: array
          items:
            $ref: '#/components/schemas/TaskEffortEntryInput'
        updatedBy:
          type: string
    UpdateTaskRequest:
      type: object
      required:
        - revision
        - updatedBy
      properties:
        revision:
          type: integer
          minimum: 1
        title:
          type: string
        description:
          type: string
        repetitionCount:
          type: integer
          minimum: 1
        isEnabled:
          type: boolean
        effortEntries:
          type: array
          items:
            $ref: '#/components/schemas/TaskEffortEntryInput'
        updatedBy:
          type: string
    TaskEffortEntryInput:
      type: object
      required:
        - roleTypeId
        - effortHours
      properties:
        roleTypeId:
          type: string
          format: uuid
        effortHours:
          type: number
          minimum: 0
    Estimate:
      type: object
      required:
        - id
        - projectId
        - name
        - revision
        - status
        - startPeriod
        - durationMonths
        - totalEffortHours
        - totalCostEur
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        name:
          type: string
        revision:
          type: integer
        description:
          type: string
        status:
          type: string
          enum: [Draft]
        startPeriod:
          type: string
        durationMonths:
          type: integer
        totalEffortHours:
          type: number
        totalCostEur:
          type: number
    Task:
      type: object
      required:
        - id
        - title
        - isEnabled
        - repetitionCount
        - totalEffortHours
        - totalCostEur
      properties:
        id:
          type: string
          format: uuid
        solutionPhase:
          type: string
        module:
          type: string
        title:
          type: string
        description:
          type: string
        isEnabled:
          type: boolean
        repetitionCount:
          type: integer
        totalEffortHours:
          type: number
        totalCostEur:
          type: number
    EstimateSummary:
      type: object
      required:
        - estimateId
        - totalSolutionComponents
        - totalModules
        - totalTasks
        - totalEffortByRoleType
        - overallEffortHours
        - overallCostEur
      properties:
        estimateId:
          type: string
          format: uuid
        totalSolutionComponents:
          type: integer
          description: Count of distinct solution phases
        totalModules:
          type: integer
        totalTasks:
          type: integer
        totalEffortByRoleType:
          type: array
          items:
            type: object
            required: [roleTypeId, roleTypeName, effortHours]
            properties:
              roleTypeId:
                type: string
                format: uuid
              roleTypeName:
                type: string
              effortHours:
                type: number
        overallEffortHours:
          type: number
        overallCostEur:
          type: number
